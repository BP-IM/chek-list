<div class="prep-section">
  <div class="prep-header">
    <h2>Подготовка к смене</h2>
    <p>
      Проверка перед началом смены, сотрудников, продуктов, оборудования,
      бизнес-планирования и сроков хранения.
    </p>
  </div>

  <div class="prep-toolbar">
    <label class="select-all-box">
      <input type="checkbox" id="prepSelectAllMorning" />
      <span>Выбрать всех (утро)</span>
    </label>

    <label class="select-all-box">
      <input type="checkbox" id="prepSelectAllEvening" />
      <span>Выбрать всех (вечер)</span>
    </label>
  </div>

  <div class="prep-table-wrap">
    <table class="prep-table">
      <thead>
        <tr>
          <th class="col-check">Утро</th>
          <th class="col-check">Вечер</th>
          <th class="col-task">Пункт проверки</th>
          <th class="col-comment">Комментарий</th>
          <th class="col-product">Срок хранения</th>
          <th class="col-time">Утро</th>
          <th class="col-time">Вечер</th>
        </tr>
      </thead>
      <tbody id="prepTableBody">
        <tr>
          <td colspan="7">Загрузка...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
